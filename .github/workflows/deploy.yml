name: Deploy to Selectel VDS

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: test-jwt-secret-min-32-chars-long-for-ci
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      # Корректная запись многострочного ключа (иначе error in libcrypto)
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Rsync to VDS
        run: |
          rsync -avz \
            --exclude node_modules \
            --exclude .git \
            --exclude dist \
            --exclude data \
            --exclude .env \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/task-planner/

      - name: Build and reload PM2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            # dist/ мог остаться от root — иначе deploy не сможет rm dist/views
            sudo chown -R deploy:deploy /var/www/task-planner
            cd /var/www/task-planner
            npm ci
            npm run build
            pm2 reload ecosystem.config.cjs --update-env
